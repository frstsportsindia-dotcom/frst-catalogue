function esc(v){return String(v).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[c]));}
function render(){const totalPages=Math.max(1,Math.ceil(filteredItems.length/pageSize));if(currentPage>totalPages)currentPage=totalPages;const start=(currentPage-1)*pageSize;grid.innerHTML='';filteredItems.slice(start,start+pageSize).forEach(item=>{const card=document.createElement('div');card.className='card';card.innerHTML='<div class="imgbox"><img src="'+item.src+'" loading="lazy"></div><div class="meta"><div class="code">'+esc(item.name)+'</div><div class="file">'+esc(item.file)+'</div></div>';card.onclick=()=>openModal(item);grid.appendChild(card)});count.textContent=filteredItems.length+' designs';pageInfo.textContent='Page '+currentPage+' of '+totalPages;prev.disabled=currentPage<=1;next.disabled=currentPage>=totalPages;}
function openModal(item){modalImg.src=item.src;modalTitle.textContent=item.name;modal.classList.add('open');}
function closePreview(){modal.classList.remove('open');modalImg.src='';}
search.oninput=()=>{const q=search.value.trim().toLowerCase();filteredItems=q?allItems.filter(x=>x.name.toLowerCase().includes(q)||x.file.toLowerCase().includes(q)):Array.from(allItems);currentPage=1;render()};prev.onclick=()=>{if(currentPage>1){currentPage--;render()}};next.onclick=()=>{const t=Math.ceil(filteredItems.length/pageSize);if(currentPage<t){currentPage++;render()}};closeModal.onclick=closePreview;modal.onclick=e=>{if(e.target===modal)closePreview()};document.onkeydown=e=>{if(e.key==='Escape')closePreview()};render();
