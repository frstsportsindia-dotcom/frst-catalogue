<!DOCTYPE html><html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>FRST Sports Catalogue</title>
<style>*{box-sizing:border-box}body{margin:0;font-family:Arial;background:#f4f4f6}.top{position:sticky;top:0;background:#111;color:#fff;padding:16px;z-index:10}.inner{max-width:1500px;margin:auto;display:flex;gap:14px;align-items:center;flex-wrap:wrap}.brand{font-weight:800;font-size:22px}.search{flex:1;min-width:240px;padding:12px;border:0;border-radius:8px}.wrap{max-width:1500px;margin:auto;padding:20px}.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:18px}.card{background:#fff;border-radius:12px;overflow:hidden;box-shadow:0 4px 16px rgba(0,0,0,.08);cursor:pointer}.imgbox{aspect-ratio:46/30;background:#e9e9ec}.imgbox img{width:100%;height:100%;object-fit:contain}.meta{padding:12px}.code{font-weight:800}.file{font-size:12px;color:#666;margin-top:4px}.pager{display:flex;justify-content:center;gap:12px;align-items:center;margin:24px}.pager button{padding:10px 16px;border:0;border-radius:8px;background:#111;color:#fff;font-weight:700}.modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.88);z-index:100;padding:24px}.modal.open{display:flex;align-items:center;justify-content:center}.modalbox{width:min(1500px,100%);height:min(94vh,1000px);background:#111;border-radius:12px;display:flex;flex-direction:column;overflow:hidden}.modalhead{color:#fff;padding:12px;display:flex;justify-content:space-between}.modalimg{flex:1;min-height:0;display:flex;align-items:center;justify-content:center}.modalimg img{max-width:100%;max-height:100%;object-fit:contain}.close{border:0;border-radius:50%;width:36px;height:36px;font-size:22px}@media(max-width:600px){.grid{grid-template-columns:repeat(2,1fr);gap:10px}.file{display:none}}</style></head><body>
<div class="top"><div class="inner"><div class="brand">FRST SPORTS CATALOGUE</div><input id="search" class="search" placeholder="Search design code or file name..."><div id="count"></div></div></div>
<div class="wrap"><div id="grid" class="grid"></div><div class="pager"><button id="prev">Previous</button><span id="pageInfo"></span><button id="next">Next</button></div></div>
<div id="modal" class="modal"><div class="modalbox"><div class="modalhead"><div id="modalTitle"></div><button id="closeModal" class="close">&times;</button></div><div class="modalimg"><img id="modalImg"></div></div></div>
<script>
const allItems=[{"name":"FRST-0001","file":"FRST-0001.png","src":"PREVIEWS/FRST-0001.png"},{"name":"FRST-0002","file":"FRST-0002.png","src":"PREVIEWS/FRST-0002.png"},{"name":"FRST-0003","file":"FRST-0003.png","src":"PREVIEWS/FRST-0003.png"},{"name":"FRST-0004","file":"FRST-0004.png","src":"PREVIEWS/FRST-0004.png"},{"name":"FRST-0005","file":"FRST-0005.png","src":"PREVIEWS/FRST-0005.png"},{"name":"FRST-0006","file":"FRST-0006.png","src":"PREVIEWS/FRST-0006.png"},{"name":"FRST-0007","file":"FRST-0007.png","src":"PREVIEWS/FRST-0007.png"},{"name":"FRST-0008","file":"FRST-0008.png","src":"PREVIEWS/FRST-0008.png"},{"name":"FRST-0009","file":"FRST-0009.png","src":"PREVIEWS/FRST-0009.png"},{"name":"FRST-0010","file":"FRST-0010.png","src":"PREVIEWS/FRST-0010.png"},{"name":"FRST-0011","file":"FRST-0011.png","src":"PREVIEWS/FRST-0011.png"},{"name":"FRST-0012","file":"FRST-0012.png","src":"PREVIEWS/FRST-0012.png"},{"name":"FRST-0013","file":"FRST-0013.png","src":"PREVIEWS/FRST-0013.png"},{"name":"FRST-0014","file":"FRST-0014.png","src":"PREVIEWS/FRST-0014.png"},{"name":"FRST-0015","file":"FRST-0015.png","src":"PREVIEWS/FRST-0015.png"},{"name":"FRST-0016","file":"FRST-0016.png","src":"PREVIEWS/FRST-0016.png"},{"name":"FRST-0017","file":"FRST-0017.png","src":"PREVIEWS/FRST-0017.png"},{"name":"FRST-0018","file":"FRST-0018.png","src":"PREVIEWS/FRST-0018.png"},{"name":"FRST-0019","file":"FRST-0019.png","src":"PREVIEWS/FRST-0019.png"},{"name":"FRST-0020","file":"FRST-0020.png","src":"PREVIEWS/FRST-0020.png"},{"name":"FRST-0021","file":"FRST-0021.png","src":"PREVIEWS/FRST-0021.png"},{"name":"FRST-0022","file":"FRST-0022.png","src":"PREVIEWS/FRST-0022.png"},{"name":"FRST-0023","file":"FRST-0023.png","src":"PREVIEWS/FRST-0023.png"},{"name":"FRST-0024","file":"FRST-0024.png","src":"PREVIEWS/FRST-0024.png"},{"name":"FRST-0025","file":"FRST-0025.png","src":"PREVIEWS/FRST-0025.png"},{"name":"FRST-0026","file":"FRST-0026.png","src":"PREVIEWS/FRST-0026.png"},{"name":"FRST-0027","file":"FRST-0027.png","src":"PREVIEWS/FRST-0027.png"},{"name":"FRST-0028","file":"FRST-0028.png","src":"PREVIEWS/FRST-0028.png"},{"name":"FRST-0029","file":"FRST-0029.png","src":"PREVIEWS/FRST-0029.png"},{"name":"FRST-0030","file":"FRST-0030.png","src":"PREVIEWS/FRST-0030.png"}],pageSize=24;let filteredItems=Array.from(allItems),currentPage=1;
const grid=document.getElementById('grid'),search=document.getElementById('search'),count=document.getElementById('count'),prev=document.getElementById('prev'),next=document.getElementById('next'),pageInfo=document.getElementById('pageInfo'),modal=document.getElementById('modal'),modalImg=document.getElementById('modalImg'),modalTitle=document.getElementById('modalTitle'),closeModal=document.getElementById('closeModal');
function esc(v){return String(v).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[c]));}
function render(){const totalPages=Math.max(1,Math.ceil(filteredItems.length/pageSize));if(currentPage>totalPages)currentPage=totalPages;const start=(currentPage-1)*pageSize;grid.innerHTML='';filteredItems.slice(start,start+pageSize).forEach(item=>{const card=document.createElement('div');card.className='card';card.innerHTML='<div class="imgbox"><img src="'+item.src+'" loading="lazy"></div><div class="meta"><div class="code">'+esc(item.name)+'</div><div class="file">'+esc(item.file)+'</div></div>';card.onclick=()=>openModal(item);grid.appendChild(card)});count.textContent=filteredItems.length+' designs';pageInfo.textContent='Page '+currentPage+' of '+totalPages;prev.disabled=currentPage<=1;next.disabled=currentPage>=totalPages;}
function openModal(item){modalImg.src=item.src;modalTitle.textContent=item.name;modal.classList.add('open');}
function closePreview(){modal.classList.remove('open');modalImg.src='';}
search.oninput=()=>{const q=search.value.trim().toLowerCase();filteredItems=q?allItems.filter(x=>x.name.toLowerCase().includes(q)||x.file.toLowerCase().includes(q)):Array.from(allItems);currentPage=1;render()};prev.onclick=()=>{if(currentPage>1){currentPage--;render()}};next.onclick=()=>{const t=Math.ceil(filteredItems.length/pageSize);if(currentPage<t){currentPage++;render()}};closeModal.onclick=closePreview;modal.onclick=e=>{if(e.target===modal)closePreview()};document.onkeydown=e=>{if(e.key==='Escape')closePreview()};render();
</script></body></html>
